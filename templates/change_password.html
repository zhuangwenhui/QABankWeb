{% extends 'base.html' %}
{% block title %}修改密码 - 题库系统{% endblock %}
{% block content %}
<div class="d-flex justify-content-center pt-4">
  <div class="card shadow-sm" style="width:100%;max-width:440px;">
    <div class="card-body p-4">
      <h5 class="mb-1"><i class="fa-solid fa-key me-1 text-primary"></i>修改密码</h5>
      {% if current_user.must_change_password %}
      <p class="text-warning small mb-3"><i class="fa-solid fa-triangle-exclamation me-1"></i>首次登录请先设置新密码后再使用系统。</p>
      {% else %}
      <p class="text-muted small mb-3">修改成功后下次登录使用新密码。</p>
      {% endif %}
      <form method="post" action="{{ url_for('change_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="mb-3">
          <label class="form-label" for="oldPassword">旧密码</label>
          <input type="password" class="form-control" id="oldPassword" name="old_password" required autocomplete="current-password">
        </div>
        <div class="mb-3">
          <label class="form-label" for="newPassword">新密码(至少 12 位)</label>
          <input type="password" class="form-control" id="newPassword" name="new_password" required minlength="12" autocomplete="new-password">
        </div>
        <div class="mb-4">
          <label class="form-label" for="confirmPassword">确认新密码</label>
          <input type="password" class="form-control" id="confirmPassword" name="confirm_password" required minlength="12" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">保存新密码</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
